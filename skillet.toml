[project]
name = "skillet"
description = "MCP-native skill discovery for AI agents"
license = "MIT OR Apache-2.0"
categories = ["tools", "skills"]
tags = ["mcp", "skills", "ai-agents"]

[[project.authors]]
name = "Josh Rotenberg"
github = "joshrotenberg"

[source]
prefer = "main"

[skills]
path = "skills"

# Suggested repos for decentralized skill discovery.
# Skillet follows these on startup to build a discovery graph.
# Any repo can suggest others; use --no-suggest to opt out.

[[suggest]]
url = "https://github.com/microsoft/skills.git"
subdir = ".github/plugins"
description = "Microsoft Azure SDK and dev skills (170 skills)"

[[suggest]]
url = "https://github.com/TerminalSkills/skills.git"
description = "Broad skill library covering 800+ tools and frameworks"

[[suggest]]
url = "https://github.com/firebase/skills.git"
description = "Firebase agent skills"

[[suggest]]
url = "https://github.com/redis/agent-skills.git"
description = "Redis agent skills"

[[suggest]]
url = "https://github.com/callstackincubator/agent-skills.git"
description = "Callstack agent skills for React Native"

[[suggest]]
url = "https://github.com/softaworks/agent-skills.git"
description = "Softaworks agent skills"
